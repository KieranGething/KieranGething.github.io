baseurl: /
languageCode: en-US
title: A Hugo website
theme: "hugo-lithium"
ignoreFiles:
  - \.Rmd$
  - \.Rmarkdown$
  - _cache$
permalinks:
  post: /:year/:month/:day/:slug/
menu:
  main:
    - name: Qualifications
      url: /Education/
      weight: 4
    - name: Experience
      url: /Experience/
      weight: 1
    - name: Research
      url: /Research/
      weight: 3
    - name: Teaching
      url: /Teaching/
      weight: 2
params:
  customCSS: ["css/custom.css"]
  MathJaxCDN: //cdnjs.cloudflare.com/ajax/libs
  MathJaxVersion: 2.7.5
  description: A website built through Hugo and blogdown.
  favicon: favicon.ico
  highlightjsCDN: //cdnjs.cloudflare.com/ajax/libs
  highlightjsLang:
    - r
    - yaml
  highlightjsTheme: github
  highlightjsVersion: 9.12.0
  logo:
    alt: Logo
    height: 50
    url: logo.jpg
    width: 50
markup:
  defaultMarkdownHandler: goldmark
  goldmark:
    renderer:
      unsafe: yes
  highlight:
    codeFences: no
